<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Böl | PerDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <a href="/" style="text-decoration: none;"><h1>PerDF</h1></a>
        <p>PDF dosyasını sayfalara ayırın veya istediğiniz aralığı bölün.</p>
    </div>

    <main class="content">
        <h2>PDF Dosyasını Yükleyin</h2>
        <form action="/split" method="post" enctype="multipart/form-data">
            <input type="file" name="pdf" required accept="application/pdf">
            <button type="submit" class="action-button">Böl</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; color: #777;">İşlemden sonra sayfalar ayrı ayrı indirebileceğiniz şekilde sunulur.</p>
    </main>

    <div class="footer">
        &copy; 2025 PerDF | PDF bölme aracı
    </div>
</body>
</html>
