<!-- PerDF PDF Bölücü Sayfası -->
<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PerDF – PDF Böl</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; }
  </style>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-800 dark:text-gray-100">
  <!-- Navbar -->
  <div class="bg-white dark:bg-gray-800 shadow-md w-full">
    <div class="max-w-6xl mx-auto flex justify-between items-center p-4">
      <div class="flex items-center gap-2">
        <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" class="w-10 h-10" alt="logo">
        <div>
          <span class="text-2xl font-bold text-red-600">PerDF</span><br>
          <span class="text-xs text-gray-500 dark:text-gray-400">PDF İşlemlerinde Kendi Yolun</span>
        </div>
      </div>
      <div class="space-x-4">
        <a href="/" class="text-indigo-600 font-medium hover:underline">📎 PDF Birleştir</a>
        <a href="/split" class="text-indigo-600 font-medium hover:underline">✂️ PDF Böl</a>
        <a href="/image-to-pdf" class="text-indigo-600 font-medium hover:underline">🖼️ Görsel → PDF</a>
        <a href="/pdf-to-image" class="text-indigo-600 font-medium hover:underline">📄 PDF → Görsel</a>
        <button onclick="document.body.classList.toggle('dark')" class="text-sm bg-gray-300 dark:bg-gray-700 px-4 py-1 rounded">
          Tema
        </button>
      </div>
    </div>
  </div>

  <!-- PDF Bölücü İçerik -->
  <div class="max-w-xl mx-auto bg-white dark:bg-gray-800 rounded-xl shadow-md p-8 mt-8 text-center">
    <h2 class="text-3xl font-semibold text-indigo-600 dark:text-indigo-400 mb-6">✂️ PDF Sayfa Böl</h2>
    <form method="POST" enctype="multipart/form-data" class="space-y-4">
      <input type="file" name="pdf" accept="application/pdf" required
             class="block w-full text-sm text-gray-700 border border-gray-300 rounded-lg cursor-pointer bg-gray-50 focus:outline-none" />
      <div class="flex gap-4 justify-between text-left">
        <div class="w-1/2">
          <label for="start" class="text-sm text-gray-600 dark:text-gray-300">Başlangıç Sayfası:</label>
          <input type="number" name="start" min="1" required class="w-full border p-2 rounded">
        </div>
        <div class="w-1/2">
          <label for="end" class="text-sm text-gray-600 dark:text-gray-300">Bitiş Sayfası:</label>
          <input type="number" name="end" min="1" required class="w-full border p-2 rounded">
        </div>
      </div>
      <button type="submit"
              class="w-full bg-indigo-600 text-white font-semibold py-2 px-4 rounded-lg hover:bg-indigo-700 transition">
        PDF'yi Böl
      </button>
    </form>
    <p class="text-sm text-gray-400 mt-4">Belirttiğiniz sayfalarla yeni bir PDF dosyası oluşturulacaktır.</p>
  </div>

  <!-- Footer -->
  <footer class="text-center text-sm text-gray-400 mt-12 mb-4">
    © 2025 PerDF | Tüm hakları saklıdır. | PDF işlemlerinde kendi yolun.
  </footer>
</body>
</html>
