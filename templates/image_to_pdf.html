<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Görsel → PDF | PerDF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="header">
        <a href="/" style="text-decoration: none;"><h1>PerDF</h1></a>
        <p>Görselleri tek bir PDF dosyası haline getirin.</p>
    </div>

    <main class="content">
        <h2>Görselleri Yükleyin</h2>
        <form action="/image_to_pdf" method="post" enctype="multipart/form-data">
            <input type="file" name="images" multiple required accept="image/*">
            <button type="submit" class="action-button">PDF'ye Dönüştür</button>
        </form>
        <p style="margin-top: 20px; font-size: 14px; color: #777;">Desteklenen formatlar: JPG, PNG, WebP vb.</p>
    </main>

    <div class="footer">
        &copy; 2025 PerDF | Görselden PDF'ye dönüştürücü
    </div>
</body>
</html>
