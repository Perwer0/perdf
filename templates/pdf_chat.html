<!-- templates/pdf_chat.html -->
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>PerDF | PDF Soru-Cevap</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<button class="theme-toggle-button" onclick="toggleTheme()">🌙 Tema Değiştir</button>

<div class="header">
    <img src="{{ url_for('static', filename='pdf-icon.png') }}" alt="PDF Logo" class="logo">
    <h1>PerDF</h1>
    <p>Yapay zekâ destekli PDF soru-cevap sistemi</p>
</div>

<div class="container" style="max-width: 800px; margin: auto; padding: 20px;">
    {% if not pdf_uploaded %}
    <form method="POST" action="/upload_pdf_chat" enctype="multipart/form-data">
        <input type="file" name="pdf_file" accept="application/pdf" required>
        <button type="submit" class="action-button" style="margin-top: 10px;">📄 PDF Yükle</button>
    </form>
    {% else %}
    <iframe src="/uploads/{{ filename }}" style="width: 100%; height: 400px; margin-bottom: 20px;"></iframe>
    <form method="POST" action="/ask_pdf_question">
        <input type="hidden" name="filename" value="{{ filename }}">
        <input type="text" name="question" placeholder="PDF hakkında bir soru sorun..." required>
        <button type="submit" class="action-button">🤖 Sor</button>
    </form>
    {% if answer %}
    <div class="answer">
        <strong>Cevap:</strong>
        <pre>{{ answer }}</pre>
    </div>
    {% endif %}
    {% endif %}
</div>

<div class="footer">
    © 2025 PerDF | Perwer AKA tarafından oluşturuldu
</div>

<script>
function toggleTheme() {
    document.body.classList.toggle('dark');
}
</script>

</body>
</html>
